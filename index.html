<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordTrainer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0e0e14;
  --surface:  #16161f;
  --surface2: #1e1e2a;
  --border:   #2a2a3a;
  --accent:   #7c6af7;
  --accent2:  #a78bfa;
  --green:    #4ade80;
  --red:      #f87171;
  --text:     #e8e8f0;
  --muted:    #7070a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
button:focus { outline: none; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
}

/* ── HEADER ── */
header {
  width: 100%; max-width: 760px;
  display: flex; align-items: center; justify-content: space-between; padding: 16px 0 18px;
}
.logo { font-size: 1.1rem; font-weight: 700; color: var(--accent2); }
.logo span { color: var(--muted); font-weight: 400; }
.stats { display: flex; gap: 16px; font-size: .85rem; color: var(--muted); }
.stats b { color: var(--text); font-weight: 600; }

/* ── CATEGORY TABS ── */
.cat-tabs {
  width: 100%; max-width: 760px;
  display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
}
.cat-btn {
  flex: 1; min-width: 120px; padding: 10px 16px;
  border: 2px solid var(--border); background: transparent;
  color: var(--muted); font-family: inherit; font-size: .92rem; font-weight: 600;
  border-radius: 10px; cursor: pointer; transition: .15s; text-align: center;
}
.cat-btn.active { border-color: var(--accent2); color: var(--accent2); background: #1a1a30; }
.cat-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

/* ── MODE TABS ── */
.mode-tabs {
  width: 100%; max-width: 760px;
  display: flex; gap: 6px; background: var(--surface);
  border-radius: 12px; padding: 5px; margin-bottom: 20px;
}
.mode-btn {
  flex: 1; padding: 9px 10px; border: none; background: transparent;
  color: var(--muted); font-family: inherit; font-size: .87rem; font-weight: 500;
  border-radius: 8px; cursor: pointer; transition: .15s;
}
.mode-btn.active { background: var(--accent); color: #fff; }
.mode-btn:hover:not(.active) { color: var(--text); background: var(--border); }

/* ── CARD ── */
.card {
  width: 100%; max-width: 760px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 28px;
}

/* ── PROGRESS ── */
.progress { margin-bottom: 22px; }
.progress-info {
  display: flex; justify-content: space-between;
  font-size: .8rem; color: var(--muted); margin-bottom: 6px;
}
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px; transition: width .3s;
}

/* ── CHIPS (settings) ── */
.chips { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.chip {
  padding: 7px 14px; border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--muted); font-family: inherit; font-size: .8rem; font-weight: 500;
  border-radius: 8px; cursor: pointer; transition: .12s;
}
.chip.active { border-color: var(--accent); color: var(--accent2); background: #1a1a30; }

/* ── QUIZ ── */
.q-label { font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.q-word { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; font-weight: 500; color: var(--accent2); margin-bottom: 6px; }
.q-hint { font-size: .88rem; color: var(--muted); margin-bottom: 10px; }
.q-pron { min-height: 36px; margin-bottom: 16px; }
.q-pron .pron-ipa  { display: block; font-family: 'JetBrains Mono', monospace; font-size: .92rem; color: var(--accent2); opacity: .85; }
.q-pron .pron-read { display: block; font-size: .8rem; color: var(--muted); margin-top: 2px; }
.answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.ans-btn {
  background: var(--surface2); border: 1.5px solid var(--border); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: .9rem;
  padding: 13px 16px; border-radius: 10px; cursor: pointer; text-align: left; transition: .12s; line-height: 1.4;
}
@media (hover: hover) {
  .ans-btn:hover:not(:disabled) { border-color: var(--accent); background: #1e1e35; }
}
.ans-btn.correct { border-color: var(--green); background: #0f2a1a; color: var(--green); }
.ans-btn.wrong   { border-color: var(--red);   background: #2a0f0f; color: var(--red); }
.ans-btn.plain   { font-family: 'Space Grotesk', sans-serif; }
.ans-btn:disabled { cursor: default; }
.ans-btn:focus { outline: none; border-color: var(--border) !important; background: var(--surface2) !important; }
.ans-btn:focus-visible { outline: none; border-color: var(--border) !important; background: var(--surface2) !important; }
.ans-btn:focus:not(.correct):not(.wrong) { border-color: var(--border) !important; background: var(--surface2) !important; }
.feedback { font-size: .9rem; min-height: 20px; }
.feedback.ok  { color: var(--green); }
.feedback.err { color: var(--red); }

/* ── END SCREEN ── */
.end-screen { text-align: center; padding: 16px 0; }
.end-score { font-size: 3.6rem; font-weight: 700; color: var(--accent2); line-height: 1; margin-bottom: 6px; }
.end-desc { color: var(--muted); margin-bottom: 24px; }
.end-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-primary {
  background: var(--accent); border: none; color: #fff;
  font-family: inherit; font-size: .92rem; font-weight: 600;
  padding: 12px 24px; border-radius: 10px; cursor: pointer; transition: .12s;
}
.btn-primary:hover { background: var(--accent2); }
.btn-ghost {
  background: transparent; border: 1.5px solid var(--border); color: var(--text);
  font-family: inherit; font-size: .92rem; font-weight: 500;
  padding: 12px 24px; border-radius: 10px; cursor: pointer; transition: .12s;
}
.btn-ghost:hover { background: var(--surface2); }

/* ── INPUT MODE ── */
.input-row { display: flex; gap: 10px; margin-bottom: 10px; }
.inp {
  flex: 1; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: .98rem;
  padding: 12px 16px; border-radius: 10px; outline: none; transition: .12s;
}
.inp:focus   { border-color: var(--accent); }
.inp.correct { border-color: var(--green); background: #0f2a1a; color: var(--green); }
.inp.wrong   { border-color: var(--red);   background: #2a0f0f; }
.check-btn {
  background: var(--accent); border: none; color: #fff;
  font-family: inherit; font-size: .88rem; font-weight: 600;
  padding: 12px 18px; border-radius: 10px; cursor: pointer; white-space: nowrap; transition: .12s;
}
.check-btn:hover { background: var(--accent2); }
.next-btn {
  width: 100%; margin-top: 8px; background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text); font-family: inherit; font-size: .88rem; font-weight: 500;
  padding: 11px; border-radius: 10px; cursor: pointer; transition: .12s;
}
.next-btn:hover { background: var(--border); }

/* ── FLASHCARDS ── */
.fc-wrap { perspective: 800px; margin-bottom: 22px; }
.fc {
  position: relative; height: 190px;
  transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,0,.2,1); cursor: pointer;
}
.fc.flipped { transform: rotateY(180deg); }
.fc-front, .fc-back {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 22px;
}
.fc-front { background: linear-gradient(135deg,#1a1a2e,#16213e); border: 1px solid var(--border); }
.fc-back  { background: linear-gradient(135deg,#0f2a1a,#1a2e1a); border: 1px solid var(--green); transform: rotateY(180deg); }
.fc-word  { font-family: 'JetBrains Mono', monospace; font-size: 1.9rem; color: var(--accent2); font-weight: 500; margin-bottom: 4px; }
.fc-ipa   { font-family: 'JetBrains Mono', monospace; font-size: .88rem; color: var(--accent2); opacity: .8; margin-bottom: 2px; text-align: center; }
.fc-read  { font-size: .78rem; color: var(--muted); text-align: center; }
.fc-sub   { font-size: .8rem; color: var(--muted); margin-top: 8px; text-align: center; }
.fc-tap   { font-size: .72rem; color: var(--muted); margin-top: 10px; }
.fc-translation { font-size: 1.35rem; font-weight: 600; color: var(--green); margin-bottom: 4px; }
.fc-nav { display: flex; gap: 10px; justify-content: center; }
.fc-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: inherit; font-size: .84rem; font-weight: 500;
  padding: 9px 20px; border-radius: 8px; cursor: pointer; transition: .12s;
}
.fc-btn:hover { background: var(--border); }
.fc-btn.learned { border-color: var(--green); color: var(--green); }
.fc-btn.learned:hover { background: #0f2a1a; }
.fc-learned-info { font-size: .78rem; color: var(--muted); text-align: center; margin-top: 12px; }

/* ── BROWSE ── */
.browse-header {
  display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px;
}
.browse-header .search-wrap { position: relative; flex: 1; }
.search-wrap .search-inp { width: 100%; padding-right: 36px; margin-bottom: 0; }
.search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: .85rem; padding: 4px; line-height: 1; opacity: 0;
  pointer-events: none; transition: opacity .15s;
}
.search-clear.visible { opacity: 1; pointer-events: auto; }
.search-clear:hover { color: var(--text); }
.search-inp { margin-bottom: 0; flex: 1; }
.btn-export {
  background: transparent; border: 1.5px solid var(--border); color: var(--text);
  font-family: inherit; font-size: .8rem; font-weight: 600;
  padding: 9px 14px; border-radius: 10px; cursor: pointer;
  transition: .15s; white-space: nowrap; flex-shrink: 0;
}
.btn-export:hover { border-color: var(--green); color: var(--green); }
.btn-delete-all {
  background: transparent; border: 1.5px solid var(--border); color: var(--red);
  font-family: inherit; font-size: .8rem; font-weight: 600;
  padding: 9px 14px; border-radius: 10px; cursor: pointer;
  transition: .15s; white-space: nowrap; flex-shrink: 0;
}
.btn-delete-all:hover { background: #2a0f0f; border-color: var(--red); }
.search-inp {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text);
  font-family: inherit; font-size: .92rem; padding: 10px 16px; border-radius: 10px;
  outline: none; margin-bottom: 14px; transition: .12s;
}
.search-inp:focus { border-color: var(--accent); }
.word-table { width: 100%; border-collapse: collapse; font-size: .86rem; }
.word-table tr.expandable { cursor: pointer; }
.word-table tr.expandable:hover td { background: var(--surface2); }
.word-table tr.detail-row td {
  padding: 6px 10px 10px 10px;
  background: #13131e;
  border-bottom: 1px solid var(--border);
}
.word-table tr.detail-row.hidden { display: none; }
.detail-inner { display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
.detail-pron { display: flex; flex-direction: column; gap: 2px; min-width: 120px; }
.detail-ipa  { font-family: "JetBrains Mono", monospace; font-size: .8rem; color: var(--accent2); }
.detail-read { font-size: .75rem; color: var(--muted); }
.detail-forms { display: flex; gap: 16px; }
.detail-form  { display: flex; flex-direction: column; gap: 2px; }
.detail-form-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.detail-form-val   { font-family: "JetBrains Mono", monospace; font-size: .82rem; color: var(--text); }
.expand-arrow { font-size: .7rem; color: var(--muted); transition: transform .2s; display: inline-block; margin-left: 4px; }
.expand-arrow.open { transform: rotate(90deg); }
@media (max-width: 1449px) {
  .desktop-only { display: none !important; }
}
@media (min-width: 1450px) {
  .word-table tr.detail-row { display: none !important; }
  .word-table tr.expandable { cursor: default; }
  .expand-arrow { display: none; }
}
.word-table th {
  text-align: left; padding: 7px 10px; color: var(--muted);
  font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--border);
}
.word-table td { padding: 8px 10px; border-bottom: 1px solid #1e1e2a; vertical-align: middle; }
.word-table tr:hover td { background: var(--surface2); }
.col-en   { font-family: 'JetBrains Mono', monospace; color: var(--accent2); }
.col-v2, .col-v3 { font-family: 'JetBrains Mono', monospace; color: var(--text); }
.col-pron { min-width: 140px; }
.pron-ipa  { display: block; font-family: 'JetBrains Mono', monospace; font-size: .76rem; color: var(--accent2); opacity: .8; }
.pron-read { display: block; font-size: .72rem; color: var(--muted); margin-top: 1px; }
.col-ru { color: var(--muted); }
.irreg { display: inline-block; background: #2a1a4a; color: var(--accent2); font-size: .62rem; padding: 1px 5px; border-radius: 3px; font-weight: 600; margin-left: 4px; vertical-align: middle; }
.row-actions { display: flex; gap: 4px; justify-content: flex-end; white-space: nowrap; }
.btn-edit {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: .88rem; padding: 3px 7px; border-radius: 5px; transition: .12s;
}
.btn-edit:hover { color: var(--accent2); background: #1a1a30; }
.btn-del {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: .88rem; padding: 3px 7px; border-radius: 5px; transition: .12s;
}
.btn-del:hover { color: var(--red); background: #2a0f0f; }

/* ── INLINE EDIT ── */
.inline-edit { display: flex; gap: 6px; align-items: center; }
.inline-inp {
  flex: 1; background: var(--surface2); border: 1.5px solid var(--accent); color: var(--text);
  font-family: 'Space Grotesk', sans-serif; font-size: .84rem;
  padding: 4px 8px; border-radius: 6px; outline: none; min-width: 100px;
}
.btn-save {
  background: var(--accent); border: none; color: #fff;
  font-family: inherit; font-size: .78rem; font-weight: 600;
  padding: 4px 10px; border-radius: 6px; cursor: pointer;
}
.btn-save:hover { background: var(--accent2); }
.btn-cancel {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: inherit; font-size: .78rem; padding: 4px 8px; border-radius: 6px; cursor: pointer;
}
.btn-cancel:hover { background: var(--border); }

/* ── ADD MODE ── */
.add-section { display: flex; flex-direction: column; gap: 14px; }
.add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.add-field-wrap { display: flex; flex-direction: column; gap: 4px; }
.add-field-wrap label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.add-inp {
  background: var(--surface2); border: 1.5px solid var(--border); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: .92rem;
  padding: 10px 13px; border-radius: 10px; outline: none; width: 100%; transition: .12s;
}
.add-inp:focus { border-color: var(--accent); }
.add-inp.plain { font-family: 'Space Grotesk', sans-serif !important; }
.add-submit {
  background: var(--accent); border: none; color: #fff; font-family: inherit;
  font-size: .92rem; font-weight: 600; padding: 12px; border-radius: 10px; cursor: pointer; transition: .12s;
}
.add-submit:hover { background: var(--accent2); }
.add-msg { font-size: .88rem; min-height: 20px; text-align: center; }
.add-msg.ok  { color: var(--green); }
.add-msg.err { color: var(--red); }
.add-divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
.custom-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.custom-title { font-size: .8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.btn-clear-all {
  background: transparent; border: 1px solid var(--border); color: var(--red);
  font-family: inherit; font-size: .74rem; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: .12s;
}
.btn-clear-all:hover { background: #2a0f0f; }
.custom-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .84rem; }
.custom-item:last-child { border-bottom: none; }
.ci-en  { font-family: 'JetBrains Mono', monospace; color: var(--accent2); min-width: 100px; }
.ci-sub { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: .76rem; flex: 1; }
.ci-ru  { color: var(--text); font-size: .82rem; flex: 1; }
.ci-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .9rem; padding: 2px 6px; border-radius: 4px; transition: .12s; flex-shrink: 0; }
.ci-del:hover { color: var(--red); background: #2a0f0f; }
.empty-list { color: var(--muted); font-size: .86rem; text-align: center; padding: 18px 0; }

/* ── UTILITIES ── */
.hidden { display: none !important; }
/* ── IMPORT MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 28px; width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
}
.modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
.modal-hint  { font-size: .82rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
.modal-hint code { background: var(--surface2); padding: 1px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: .8rem; color: var(--accent2); }
.import-textarea {
  width: 100%; height: 180px; background: var(--surface2);
  border: 1.5px solid var(--border); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: .88rem;
  padding: 12px 14px; border-radius: 10px; outline: none;
  resize: vertical; line-height: 1.6;
}
.import-textarea:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; flex-wrap: wrap; }
.import-progress { font-size: .84rem; color: var(--muted); margin-top: 12px; min-height: 20px; }
.import-progress.ok  { color: var(--green); }
.import-progress.err  { color: var(--red); }
.import-progress.warn { color: #f59e0b; }
.btn-import-action {
  background: var(--accent); border: none; color: #fff;
  font-family: inherit; font-size: .88rem; font-weight: 600;
  padding: 10px 22px; border-radius: 10px; cursor: pointer; transition: .12s;
}
.btn-import-action:hover { background: var(--accent2); }
.btn-import-action:disabled { opacity: .5; cursor: default; }
.btn-import-cancel {
  background: transparent; border: 1.5px solid var(--border); color: var(--muted);
  font-family: inherit; font-size: .88rem;
  padding: 10px 18px; border-radius: 10px; cursor: pointer; transition: .12s;
}
.btn-import-cancel:hover { background: var(--surface2); }
.btn-import-list {
  width: 100%; margin-top: 10px;
  background: transparent; border: 1.5px dashed var(--border); color: var(--muted);
  font-family: inherit; font-size: .88rem; font-weight: 500;
  padding: 11px; border-radius: 10px; cursor: pointer; transition: .15s;
}
.btn-import-list:hover { border-color: var(--accent2); color: var(--accent2); background: #1a1a30; }

.scroll-top {
  position: fixed; bottom: 28px; right: 20px;
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--accent); border: none; color: #fff;
  font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(124,106,247,.45);
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
  z-index: 999;
}
.scroll-top.visible { opacity: 1; pointer-events: auto; }
.scroll-top:hover { background: var(--accent2); }
@media (max-width: 520px) {
  .card { padding: 16px; }
  .q-word { font-size: 1.6rem; }
  .answers { grid-template-columns: 1fr; }
  .fc-word { font-size: 1.5rem; }
  header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .cat-tabs { flex-wrap: wrap; }
  .add-grid { grid-template-columns: 1fr; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div class="logo">WordTrainer <span id="logo-sub">...</span></div>
  <div class="stats">
    <span>&#10003; <b id="s-ok">0</b></span>
    <span>&#10007; <b id="s-err">0</b></span>
    <span>&#128293; <b id="s-streak">0</b></span>
  </div>

  cph: 'wt_cph',  // custom phrasal
  del: 'wt_del',  // permanently deleted  {cat:word, ...}
  ed:  'wt_ed',   // edit overrides       {cat:word: newRu}
};

let customVerbs   = [];
let customAdjs    = [];
let customNouns   = [];
let customPhrasal = [];
let deleted  = new Set();   // "verbs:act", "nouns:ability", …
let edits    = {};          // "verbs:act" → "делать"

function loadStorage() {
  const load = (key, fallback) => { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; } };
  customVerbs   = load(SK.cv,  []);
  customAdjs    = load(SK.ca,  []);
  customNouns   = load(SK.cn,  []);
  customPhrasal = load(SK.cph, []);
  deleted  = new Set(load(SK.del, []));
  edits    = load(SK.ed,  {});
}

function saveStorage() {
  const s = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };
  s(SK.cv,  customVerbs);
  s(SK.ca,  customAdjs);
  s(SK.cn,  customNouns);
  s(SK.cph, customPhrasal);
  s(SK.del, [...deleted]);
  s(SK.ed,  edits);
}

// DATA HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function isActive(c, word) { return !deleted.has(c + ':' + word); }
function getRu(c, entry) {
  const key = c + ':' + entry[0];
  return edits[key] !== undefined ? edits[key] : (c === 'verbs' ? entry[3] : entry[1]);
}
function isIrreg(v) {
  const b  = v[0].split(' ')[0].toLowerCase();
  const v2 = v[1].split(' ')[0].toLowerCase();
  const v3 = v[2].split(' ')[0].toLowerCase();
  // Regular if BOTH V2 and V3 follow standard patterns AND v2===v3
  const v2regular =
    b + 'ed' === v2 ||
    (b.endsWith('e') && b + 'd' === v2) ||
    (b.endsWith('y') && b.slice(0,-1) + 'ied' === v2) ||
    (b.length > 2 && b + b[b.length-1] + 'ed' === v2);
  return !(v2regular && v2 === v3);
}

function getList() {
  let raw;
  if      (cat === 'verbs')   raw = [...VERBS,   ...customVerbs];
  else if (cat === 'adj')     raw = [...ADJS,    ...customAdjs];
  else if (cat === 'nouns')   raw = [...NOUNS,   ...customNouns];
  else                        raw = [...PHRASAL, ...customPhrasal];
  return raw.filter(e => isActive(cat, e[0]));
}

function countWords() {
  return getList().length;
}

function updateLogo() {
  const labels = { verbs: 'глаголов', adj: 'прилагательных', nouns: 'существительных', phrasal: 'фразовых глаголов' };
  document.getElementById('logo-sub').textContent = countWords() + ' ' + labels[cat];
}

function shuffle(a) {
  a = [...a];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.random() * i | 0;
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function rand4(pool, correct) {
  const others = shuffle(pool.filter(x => x !== correct)).slice(0, 3);
  return shuffle([correct, ...others]);
}

  if (mode === 'input')  startInput();
  if (mode === 'cards')  startCards();

function setDir(d) {
  if (d === 'irreg') { onlyIrreg = !onlyIrreg; } else { dir = d; }
  document.querySelectorAll('[data-dir]').forEach(b => {
    if (b.dataset.dir === 'irreg') b.classList.toggle('active', onlyIrreg);
    else b.classList.toggle('active', b.dataset.dir === dir);
  });
  startQuiz();
}

function setDir2(d) {
  dir2 = d;
  document.querySelectorAll('[data-dir2]').forEach(b => b.classList.toggle('active', b.dataset.dir2 === d));
  startQuiz();
}

function startQuiz() {
  // Show correct chip set
  document.getElementById('chips-verbs').classList.toggle('hidden', cat !== 'verbs');
  document.getElementById('chips-simple').classList.toggle('hidden', cat === 'verbs');

  document.getElementById('quiz-body').classList.remove('hidden');
  document.getElementById('quiz-end').classList.add('hidden');

  let pool = getList();
  if (cat === 'verbs' && onlyIrreg) pool = pool.filter(isIrreg);
  quizList = shuffle(pool);
  quizIdx = 0;
  quizAnswered = false;
  showQuestion();
}

function showQuestion() {
  if (quizIdx >= quizList.length) { showQuizEnd(); return; }
  quizAnswered = false;
  const v = quizList[quizIdx];
  setProgress('q', quizIdx, quizList.length);
  document.getElementById('q-fb').textContent = '';
  document.getElementById('q-fb').className = 'feedback';

  if (cat === 'verbs') {
    if (dir === 'ru') {
      setText('q-lbl', 'Рус → V1');
      setText('q-word', getRu('verbs', v));
      setText('q-hint', '→ Выбери правильный глагол');
      setQPron('', '');
      renderAnswers(rand4(quizList.map(x => x[0]), v[0]), v[0], false);
    } else if (dir === 'en') {
      setText('q-lbl', 'V1 → Рус');
      setText('q-word', v[0]);
      setText('q-hint', '→ Выбери перевод');
      setQPron(v[4] || '', v[5] || '');
      renderAnswers(rand4(quizList.map(x => getRu('verbs', x)), getRu('verbs', v)), getRu('verbs', v), true);
    } else {
      const correct = v[1] + ' / ' + v[2];
      setText('q-lbl', 'V1 → V2/V3');
      setText('q-word', v[0]);
      setText('q-hint', '→ Выбери правильные формы');
      setQPron(v[4] || '', v[5] || '');
      renderAnswers(rand4(quizList.map(x => x[1] + ' / ' + x[2]), correct), correct, false);
    }
  } else {
    const ruIdx = 1;
    if (dir2 === 'ru') {
      setText('q-lbl', 'Рус → Англ');
      setText('q-word', getRu(cat, v));
      setText('q-hint', '→ Выбери правильный вариант');
      setQPron('', '');
      renderAnswers(rand4(quizList.map(x => x[0]), v[0]), v[0], false);
    } else {
      setText('q-lbl', 'Англ → Рус');
      setText('q-word', v[0]);
      setText('q-hint', '→ Выбери перевод');
      setQPron(v[2] || '', v[3] || '');
      renderAnswers(rand4(quizList.map(x => getRu(cat, x)), getRu(cat, v)), getRu(cat, v), true);
    }
  }
}

function renderAnswers(opts, correct, plain) {
  // Remove focus from whatever was focused before
  if (document.activeElement) document.activeElement.blur();
  const grid = document.getElementById('q-answers');
  grid.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn' + (plain ? ' plain' : '');
    btn.textContent = opt;
    btn.addEventListener('click', () => pickAnswer(btn, opt, correct));
    grid.appendChild(btn);
  });
}

function pickAnswer(btn, chosen, correct) {
  btn.blur();
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.ans-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  const fb = document.getElementById('q-fb');
  if (chosen === correct) {
    btn.classList.add('correct');
    fb.textContent = '✓ Правильно!'; fb.className = 'feedback ok';
    totalOk++; streak++;
  } else {
    btn.classList.add('wrong');
    fb.textContent = '✗ Правильно: ' + correct; fb.className = 'feedback err';

async function fetchPron(word) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 100,
        messages: [{
          role: 'user',
          content: 'For the English word or phrase "' + word + '" give me ONLY a JSON object with two fields: "ipa" (American English IPA transcription without slashes) and "read" (how to pronounce it in Russian letters, with stress mark ´ after the stressed vowel). No explanation, just JSON. Example: {"ipa":"kwaɪət","read":"ква́йэт"}'
        }]
      })
    });
    if (!res.ok) return { ipa: '', read: '' };
    const data = await res.json();
    const text = data.content && data.content[0] ? data.content[0].text : '';
    const match = text.match(/\{[^}]+\}/);
    if (!match) return { ipa: '', read: '' };
    const parsed = JSON.parse(match[0]);
    return { ipa: parsed.ipa || '', read: parsed.read || '' };
  } catch(e) { return { ipa: '', read: '' }; }
}

function setQPron(ipa, read) {
  const el = document.getElementById('q-pron');
  if (!el) return;
  if (ipa) {
    el.innerHTML = '<span class="pron-ipa">[' + ipa + ']</span><span class="pron-read">' + read + '</span>';
  } else {
    el.innerHTML = '';
  }
}

function setProgress(prefix, idx, total) {
  const pct = total ? Math.round(idx / total * 100) : 0;
  document.getElementById(prefix+'-cur').textContent = idx + 1;
  document.getElementById(prefix+'-tot').textContent = total;
  document.getElementById(prefix+'-pct').textContent = pct + '%';
  document.getElementById(prefix+'-fill').style.width = pct + '%';
}

function updateStats() {
  document.getElementById('s-ok').textContent     = totalOk;
  document.getElementById('s-err').textContent    = totalErr;
  document.getElementById('s-streak').textContent = streak;
}

function showMsg(el, text, ok) {
  el.textContent = text;
  el.className = 'add-msg ' + (ok ? 'ok' : 'err');
}

loadStorage();
switchCat('verbs');

// ── IMPORT ────────────────────────────────────────────────────────────────────
function openImport() {
  document.getElementById('import-text').value = '';
  document.getElementById('import-progress').textContent = '';
  document.getElementById('import-progress').className = 'import-progress';
  document.getElementById('import-btn').disabled = false;
  document.getElementById('import-modal').classList.remove('hidden');
}

function closeImport() {
  document.getElementById('import-modal').classList.add('hidden');
}

async function runImport() {
  const raw = document.getElementById('import-text').value.trim();
  if (!raw) return;

  const btn = document.getElementById('import-btn');
  const prog = document.getElementById('import-progress');
  btn.disabled = true;

  const lines = raw.split('\n').map(l => l.trim()).filter(l => l);
  let added = 0, skipped = 0, errors = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    prog.textContent = 'Обрабатываю ' + (i+1) + ' / ' + lines.length + '...';
    prog.className = 'import-progress';

    // Try different formats:
    // 1. "word - translation" or "word — translation"
    // 2. "v1 / v2 / v3 - translation" (already covered by #1)
    // 3. "word	translation" (tab separated)
    // 4. "v1	v2	v3	translation" (tab separated with forms)
    // 5. "word translation" (space separated — last word(s) are Russian)
    let left = '', ru = '';

    if (line.includes('-') || line.includes('—')) {
      // Format: word - translation
      const m = line.match(/^(.+?)\s*[-—]\s*(.+)$/);
      if (m) { left = m[1].trim(); ru = m[2].trim(); }
    } else if (line.includes('	')) {
      // Tab separated
      const parts = line.split('	').map(p => p.trim()).filter(p => p);
      if (parts.length === 2) {
        left = parts[0]; ru = parts[1];
      } else if (parts.length >= 4) {
        // v1 v2 v3 translation
        left = parts[0] + ' / ' + parts[1] + ' / ' + parts[2];
        ru = parts[3];
      } else if (parts.length === 3) {
        left = parts[0]; ru = parts[2];
      }
    } else {
      // Space separated — find split point between English and Russian
      // Russian starts when we hit a Cyrillic character
      const spaceMatch = line.match(/^([a-zA-Z][a-zA-Z0-9\s\/]*?)\s+([а-яёА-ЯЁ].*)$/);
      if (spaceMatch) { left = spaceMatch[1].trim(); ru = spaceMatch[2].trim(); }
    }

    if (!left || !ru) { errors.push(line); continue; }

    if (cat === 'verbs') {
      // Check if has V1/V2/V3 format
      const parts = left.split('/').map(p => p.trim());
      const v1 = parts[0].toLowerCase();
      const v2 = (parts[1] || v1 + 'ed').toLowerCase();
      const v3 = (parts[2] || v2).toLowerCase();

      if (getList().find(v => v[0] === v1)) { skipped++; continue; }
      deleted.delete('verbs:' + v1);
      const pronV = await fetchPron(v1);
      customVerbs.push([v1, v2, v3, ru, pronV.ipa || '', pronV.read || '']);
      added++;
    } else {
      const en = left.toLowerCase();
      if (getList().find(v => v[0] === en)) { skipped++; continue; }
      deleted.delete(cat + ':' + en);
      const pronS = await fetchPron(en);
      if      (cat === 'adj')     customAdjs.push([en, ru, pronS.ipa || '', pronS.read || '']);
      else if (cat === 'nouns')   customNouns.push([en, ru, pronS.ipa || '', pronS.read || '']);
      else                        customPhrasal.push([en, ru, pronS.ipa || '', pronS.read || '']);
      added++;
    }

    saveStorage();
  }

  updateLogo();
  renderBrowse();

  let msg = '';
  let status = 'ok';
  if (added > 0) msg += '✓ Добавлено: ' + added;
  if (skipped > 0) {
    msg += (msg ? ', ' : '') + 'пропущено (уже есть): ' + skipped;
    if (added === 0 && errors.length === 0) status = 'warn';
    else if (added > 0) status = 'warn';
  }
  if (errors.length > 0) {
    msg += (msg ? ', ' : '') + '✗ Не удалось разобрать: ' + errors.length;
    status = added === 0 ? 'err' : 'warn';
  }
  prog.textContent = msg;
  prog.className = 'import-progress ' + status;
  btn.disabled = false;
}

// Init DOM-dependent listeners after page load
window.addEventListener('DOMContentLoaded', function() {
  // Delegated listener for browse table — expand, edit, delete
  document.getElementById('tbl-body').addEventListener('click', function(e) {
    const editBtn = e.target.closest('.btn-edit');
    const delBtn  = e.target.closest('.btn-del');
    if (editBtn) {
      e.stopPropagation();
      startInlineEdit(editBtn.dataset.cat, editBtn.dataset.word, editBtn.dataset.ru);
    } else if (delBtn) {
      e.stopPropagation();
      deleteWord(delBtn.dataset.cat, delBtn.dataset.word);
    } else {
      const row = e.target.closest('tr.expandable');
      if (row && row.dataset.rid) toggleRow(row.dataset.rid);
    }
  });

  // Close confirm modal on overlay click
  document.getElementById('confirm-modal').addEventListener('click', function(e) {
    if (e.target === this) confirmResolve(false);
  });

  // Close import modal on overlay click
  document.getElementById('import-modal').addEventListener('click', function(e) {
    if (e.target === this) closeImport();
  });

  // Show/hide scroll-to-top button
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('scroll-top-btn');
    if (!btn) return;
    btn.classList.toggle('visible', window.scrollY > 300);
  });
});
</script>

    <div class="modal-hint">
      Вставь список по одному слову на строку. Поддерживаются форматы:<br>
      <code>cat - кот</code> &nbsp; или &nbsp; <code>cat кот</code><br>
      Для глаголов: <code>V1 / V2 / V3 - перевод</code> &nbsp; или &nbsp; <code>V1 V2 V3 перевод</code>
    </div>
    <textarea class="import-textarea" id="import-text" placeholder="brave - смелый&#10;give up сдаваться&#10;see / saw / seen - видеть&#10;cat	кот"></textarea>
    <div class="import-progress" id="import-progress"></div>
    <div class="modal-actions">
      <button class="btn-import-cancel" onclick="closeImport()">Отмена</button>
      <button class="btn-import-action" id="import-btn" onclick="runImport()">&#10003; Импортировать</button>
    </div>
  </div>
</div>
